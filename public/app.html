<style id="reminders-css">
#reminders-container{position:fixed;top:0;left:0;right:0;z-index:35;pointer-events:none;display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:6px}
@media(max-width:768px){#reminders-container{padding-top:62px}}
@media(min-width:769px){#reminders-container{padding-left:14rem}}
.reminder-bar{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;font-family:'DM Sans',system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.15);animation:slideDown .4s ease-out;max-width:520px;width:calc(100% - 24px)}
.reminder-bar.meter{background:linear-gradient(135deg,#1e40af,#3b82f6);color:white}
.reminder-bar.invoice{background:linear-gradient(135deg,#b45309,#f59e0b);color:white}
.reminder-bar .r-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.reminder-bar.meter .r-icon{background:rgba(255,255,255,0.2)}
.reminder-bar.invoice .r-icon{background:rgba(255,255,255,0.2)}
.reminder-bar .r-text{flex:1;line-height:1.3}
.reminder-bar .r-title{font-weight:700;font-size:13px}
.reminder-bar .r-sub{font-weight:400;font-size:11px;opacity:0.85}
.reminder-bar .r-close{width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,0.2);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;line-height:1}
.reminder-bar .r-close:hover{background:rgba(255,255,255,0.35)}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
</style>
<style id="features-css">
/* === WHATSAPP BUTTON === */
.wa-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:#25d366;color:#fff;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .2s}
.wa-btn:hover{background:#1da851}
.wa-btn svg{flex-shrink:0}

/* === HISTORY MODAL === */
#hist-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px}
#hist-overlay.active{display:flex}
#hist-modal{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;margin-top:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
#hist-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#f8fafc}
#hist-header h3{font-size:16px;font-weight:800;color:#0f172a;margin:0}
#hist-close{width:32px;height:32px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#64748b}
#hist-body{overflow-y:auto;padding:16px 20px;flex:1}
.hist-year{font-size:13px;font-weight:800;color:#3b82f6;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.05em}
.hist-year:first-child{margin-top:0}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;margin-bottom:4px;font-size:13px;background:#f8fafc;gap:8px}
.hist-row:hover{background:#eff6ff}
.hist-month{font-weight:700;color:#334155;min-width:80px}
.hist-charge{color:#64748b;flex:1;text-align:right}
.hist-paid{font-weight:700;min-width:90px;text-align:right}
.hist-paid.green{color:#059669}
.hist-paid.red{color:#dc2626}
.hist-paid.yellow{color:#d97706}
.hist-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;padding-bottom:16px;border-bottom:2px solid #e2e8f0}
.hist-stat{padding:12px;border-radius:10px;text-align:center}
.hist-stat .val{font-size:18px;font-weight:800;color:#0f172a}
.hist-stat .lbl{font-size:11px;color:#64748b;margin-top:2px}
.hist-tabs{display:flex;gap:4px;margin-bottom:12px}
.hist-tab{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#f1f5f9;color:#64748b;font-family:inherit}
.hist-tab.active{background:#3b82f6;color:#fff}

/* === JOURNAL === */
#journal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px}
#journal-overlay.active{display:flex}
#journal-modal{background:#fff;border-radius:16px;width:100%;max-width:650px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;margin-top:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
#journal-header{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#f8fafc}
#journal-header h3{font-size:16px;font-weight:800;color:#0f172a;margin:0}
#journal-body{overflow-y:auto;padding:16px 20px;flex:1}
.j-filters{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.j-filt{padding:5px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#f1f5f9;color:#64748b;font-family:inherit}
.j-filt.active{background:#3b82f6;color:#fff}
.j-filt.s-new.active{background:#f59e0b;color:#fff}
.j-filt.s-work.active{background:#3b82f6;color:#fff}
.j-filt.s-done.active{background:#059669;color:#fff}
.j-card{border:1px solid #e2e8f0;border-radius:12px;padding:12px;margin-bottom:8px;transition:all .2s}
.j-card:hover{border-color:#93c5fd}
.j-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.j-card-apt{font-weight:700;font-size:13px;color:#0f172a}
.j-card-date{font-size:11px;color:#94a3b8;white-space:nowrap}
.j-card-text{font-size:13px;color:#334155;margin-bottom:8px;line-height:1.4}
.j-card-bottom{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.j-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.j-badge.new{background:#fef3c7;color:#92400e}
.j-badge.work{background:#dbeafe;color:#1e40af}
.j-badge.done{background:#d1fae5;color:#065f46}
.j-del{margin-left:auto;padding:3px 8px;border-radius:6px;border:none;background:#fee2e2;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.j-add-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.j-add-bar select,.j-add-bar input,.j-add-bar textarea{padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit}
.j-add-bar select{min-width:100px}
.j-add-bar input,.j-add-bar textarea{flex:1;min-width:150px}
.j-add-btn{padding:8px 16px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.j-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#ef4444;color:#fff;font-size:10px;font-weight:800;margin-left:6px}

/* === JOURNAL NAV BUTTON === */
.journal-nav-btn{width:100%;display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:14px;font-weight:500;transition:all .15s;text-align:left;position:relative;border:none;cursor:pointer;background:transparent;color:#94a3b8;font-family:inherit}
.journal-nav-btn:hover{color:#fff;background:#1e293b}

@media(max-width:768px){
  #hist-modal,#journal-modal{margin-top:60px;max-height:85vh;max-width:95vw}
  .hist-summary{grid-template-columns:1fr 1fr}
  .j-add-bar{flex-direction:column}
  .j-add-bar select,.j-add-bar input{width:100%}
}
</style>

<style id="greenapi-css">

.ga-status.err{background:#fef2f2;color:#dc2626}
.ga-status.info{background:#eff6ff;color:#1d4ed8}
.ga-test{width:100%;padding:10px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px}
.ga-test:hover{background:#f8fafc}

/* Bulk send modal */
#ga-bulk-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px}
#ga-bulk-overlay.active{display:flex}
#ga-bulk-modal{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;margin-top:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
#ga-bulk-body{padding:20px;overflow-y:auto;flex:1}
.ga-progress{width:100%;height:8px;background:#e2e8f0;border-radius:4px;margin:12px 0;overflow:hidden}
.ga-progress-bar{height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:4px;transition:width .3s ease;width:0%}
.ga-log{max-height:300px;overflow-y:auto;font-size:12px;font-family:'DM Sans',monospace;line-height:1.8}
.ga-log-item{padding:4px 8px;border-radius:6px;margin-bottom:2px}
.ga-log-item.ok{background:#ecfdf5;color:#059669}
.ga-log-item.err{background:#fef2f2;color:#dc2626}
.ga-log-item.skip{background:#fefce8;color:#a16207}
.ga-log-item.wait{background:#f1f5f9;color:#64748b}
.ga-bulk-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;background:#25d366;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.ga-bulk-btn:hover{background:#1da851}
.ga-bulk-btn:disabled{opacity:0.5;cursor:not-allowed}
.ga-bulk-btn svg{flex-shrink:0}
.ga-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.ga-summary-item{text-align:center;padding:10px;border-radius:10px}
.ga-summary-item .num{font-size:20px;font-weight:800}
.ga-summary-item .lbl{font-size:11px;color:#64748b}

/* Nav button */
.ga-nav-btn{width:100%;display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:14px;font-weight:500;transition:all .15s;text-align:left;position:relative;border:none;cursor:pointer;background:transparent;color:#94a3b8;font-family:inherit}
.ga-nav-btn:hover{color:#fff;background:#1e293b}

@media(max-width:768px){
  #ga-settings-modal,#ga-bulk-modal{margin-top:60px;max-width:95vw}
}
</style>
<style id="mega-css">
/* BALANCE */
#balance-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
#balance-overlay.active{display:flex}
#balance-modal{background:#fff;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;margin-top:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.bal-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#f8fafc;position:sticky;top:0;z-index:1}
.bal-header h3{font-size:15px;font-weight:800;color:#0f172a;margin:0}
.bal-body{padding:20px}
.bal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.bal-card{padding:14px;border-radius:12px;text-align:center}
.bal-card .val{font-size:20px;font-weight:800}
.bal-card .lbl{font-size:11px;color:#64748b;margin-top:2px}
.bal-table{width:100%;border-collapse:collapse;font-size:13px}
.bal-table th{text-align:left;padding:8px 10px;background:#f1f5f9;font-weight:700;color:#475569;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.bal-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
.bal-table tr:hover{background:#f8fafc}
.bal-total td{font-weight:800;border-top:2px solid #e2e8f0;background:#f8fafc}
.bal-positive{color:#059669}
.bal-negative{color:#dc2626}

/* ACT SVERKI */
.act-btn{padding:6px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#7c3aed;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.act-btn:hover{background:#f5f3ff;border-color:#c4b5fd}

/* QR */
.qr-wrap{margin-top:8px;padding:10px;background:#f8fafc;border-radius:10px;text-align:center}
.qr-wrap canvas{margin:0 auto 6px}
.qr-label{font-size:10px;color:#64748b}

/* CHARTS */
.chart-wrap{margin:16px 0;background:#fff;border-radius:12px;padding:12px;border:1px solid #e2e8f0}
.chart-wrap canvas{width:100%!important;max-height:200px}
.charts-row{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-bottom:16px}
.chart-title{font-size:12px;font-weight:700;color:#475569;margin-bottom:8px}

/* SECTION HEADERS */
.bal-section{font-size:13px;font-weight:800;color:#0f172a;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid #e2e8f0;display:flex;align-items:center;gap:6px}
.bal-section:first-child{margin-top:0}

/* DEBT TABLE */
.debt-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;font-size:13px}
.debt-row:nth-child(odd){background:#f8fafc}
.debt-row .apt-name{font-weight:600;color:#0f172a}
.debt-row .debt-val{font-weight:700}

/* DISTRIBUTION MODAL */
#dist-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto}
#dist-overlay.active{display:flex}
#dist-modal{background:#fff;border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;margin-top:30px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.dist-form{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px;align-items:end}
.dist-form label{display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:4px}
.dist-form select,.dist-form input{width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box}
.dist-form select:focus,.dist-form input:focus{border-color:#3b82f6}
.dist-btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.dist-btn-primary{background:#1e40af;color:#fff}
.dist-btn-primary:hover{background:#1d4ed8}
.dist-btn-save{background:#059669;color:#fff}
.dist-btn-save:hover{background:#047857}
.dist-result{margin-top:16px}
.dist-table{width:100%;border-collapse:collapse;font-size:13px}
.dist-table th{text-align:left;padding:8px 10px;background:#f1f5f9;font-weight:700;color:#475569;font-size:11px;text-transform:uppercase}
.dist-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
.dist-table tr:hover{background:#f8fafc}
.dist-table .total-row td{font-weight:800;border-top:2px solid #e2e8f0;background:#f8fafc}
.dist-info{padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:12px;color:#1e40af;margin-bottom:16px;line-height:1.6}
.dist-saved-list{margin-top:16px}
.dist-saved-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f8fafc;border-radius:10px;margin-bottom:6px;font-size:13px}
.dist-saved-item .dist-type{font-weight:700;color:#0f172a}
.dist-saved-item .dist-amount{font-weight:700;color:#1e40af}
.dist-del{background:none;border:none;color:#dc2626;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px}
.dist-del:hover{background:#fef2f2}

/* NAV */
.mega-nav-btn{width:100%;display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:14px;font-weight:500;transition:all .15s;text-align:left;border:none;cursor:pointer;background:transparent;color:#94a3b8;font-family:inherit}
.mega-nav-btn:hover{color:#fff;background:#1e293b}

@media(max-width:768px){
  #balance-modal{max-width:95vw;margin-top:60px}
  #dist-modal{max-width:95vw;margin-top:60px}
  .bal-grid{grid-template-columns:1fr 1fr}
  .bal-table{font-size:11px;display:block;overflow-x:auto}
  .dist-form{grid-template-columns:1fr 1fr}
  .dist-table{font-size:11px;display:block;overflow-x:auto}
  .charts-row{grid-template-columns:1fr}
}
</style>

<script id="data-transfer">
(function(){
var KEYS=["zhk-apartments","zhk-common-meter-defs","zhk-common-meters","zhk-employees","zhk-expenses","zhk-global-tariffs","zhk-meters","zhk-payments","zhk-salary","zhk-requests"];

function initTransfer(){
  if(document.getElementById('data-transfer-btns'))return;
  var sidebar=document.querySelector('.fixed.left-0.top-0.h-full.w-56');
  if(!sidebar){setTimeout(initTransfer,300);return}
  
  var wrap=document.createElement('div');
  wrap.id='data-transfer-btns';
  wrap.style.cssText='padding:8px 16px;border-top:1px solid #1e293b;display:flex;gap:6px';
  
  var btnStyle='flex:1;padding:6px 0;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;';
  
  var expBtn=document.createElement('button');
  expBtn.textContent='Экспорт';
  expBtn.style.cssText=btnStyle+'background:#1e40af;color:white;';
  expBtn.onclick=function(){
    var data={};
    KEYS.forEach(function(k){var v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v)});
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='aksu_backup_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();
    URL.revokeObjectURL(a.href);
  };
  
  var impBtn=document.createElement('button');
  impBtn.textContent='Импорт';
  impBtn.style.cssText=btnStyle+'background:#334155;color:#e2e8f0;';
  impBtn.onclick=function(){
    var inp=document.createElement('input');
    inp.type='file';
    inp.accept='.json';
    inp.onchange=function(e){
      var file=e.target.files[0];
      if(!file)return;
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var data=JSON.parse(ev.target.result);
          var count=0;
          KEYS.forEach(function(k){if(data[k]!==undefined){localStorage.setItem(k,JSON.stringify(data[k]));count++}});
          alert('Импортировано '+count+' разделов данных. Страница будет перезагружена.');
          location.reload();
        }catch(err){alert('Ошибка чтения файла: '+err.message)}
      };
      reader.readAsText(file);
    };
    inp.click();
  };
  
  wrap.appendChild(expBtn);
  wrap.appendChild(impBtn);
  
  // Insert before the period selector at bottom of sidebar
  var periodDiv=sidebar.querySelector('.border-t.border-slate-800');
  if(periodDiv)sidebar.insertBefore(wrap,periodDiv);
  else sidebar.appendChild(wrap);
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(initTransfer,500)});
else setTimeout(initTransfer,500);
})();
</script>
<script id="mobile-responsive-js">
(function(){
function initMobile(){
if(document.getElementById('mobile-hamburger'))return;
var sidebar=document.querySelector('.fixed.left-0.top-0.h-full.w-56');
if(!sidebar){setTimeout(initMobile,200);return}

// Hamburger
var btn=document.createElement('button');
btn.id='mobile-hamburger';
btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
document.body.appendChild(btn);

// Overlay
var overlay=document.createElement('div');
overlay.id='mobile-overlay';
document.body.appendChild(overlay);

// Period bar - build from scratch with current date
var periodBar=document.createElement('div');
periodBar.id='mobile-period-bar';
document.body.appendChild(periodBar);

var months=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

function buildPeriodBar(){
  var sp=sidebar.querySelector('.border-t.border-slate-800');
  if(!sp)return false;
  var origSelects=sp.querySelectorAll('select');
  if(origSelects.length<2)return false;

  periodBar.innerHTML='';
  var label=document.createElement('span');
  label.className='period-label';
  label.textContent='ПЕРИОД:';
  periodBar.appendChild(label);

  // Month select
  var mSel=document.createElement('select');
  mSel.id='mob-month';
  months.forEach(function(m,idx){
    var o=document.createElement('option');
    o.value=idx+1;
    o.textContent=m.substring(0,3);
    mSel.appendChild(o);
  });
  mSel.value=origSelects[0].value;
  mSel.addEventListener('change',function(){
    origSelects[0].value=this.value;
    var nativeInputValueSetter=Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,'value').set;
    nativeInputValueSetter.call(origSelects[0],this.value);
    origSelects[0].dispatchEvent(new Event('change',{bubbles:true}));
  });
  periodBar.appendChild(mSel);

  // Year select
  var ySel=document.createElement('select');
  ySel.id='mob-year';
  [2024,2025,2026,2027].forEach(function(y){
    var o=document.createElement('option');
    o.value=y;
    o.textContent=y;
    ySel.appendChild(o);
  });
  ySel.value=origSelects[1].value;
  ySel.addEventListener('change',function(){
    origSelects[1].value=this.value;
    var nativeInputValueSetter=Object.getOwnPropertyDescriptor(window.HTMLSelectElement.prototype,'value').set;
    nativeInputValueSetter.call(origSelects[1],this.value);
    origSelects[1].dispatchEvent(new Event('change',{bubbles:true}));
  });
  periodBar.appendChild(ySel);

  // Watch for sidebar select changes (when user changes via sidebar)
  origSelects[0].addEventListener('change',function(){
    var ms=document.getElementById('mob-month');
    if(ms&&ms.value!==this.value)ms.value=this.value;
  });
  origSelects[1].addEventListener('change',function(){
    var ys=document.getElementById('mob-year');
    if(ys&&ys.value!==this.value)ys.value=this.value;
  });

  return true;
}

// Try building period bar, retry if React hasn't rendered yet
var attempts=0;
function tryBuild(){
  if(buildPeriodBar())return;
  if(++attempts<20)setTimeout(tryBuild,300);
}
tryBuild();

// Sidebar toggle
var isOpen=false;
function toggle(){
  isOpen=!isOpen;
  if(isOpen){

<script id="greenapi-js">
(function(){
var GAKEYS={id:'greenapi-idInstance',token:'greenapi-apiToken'};
function getGA(){return{id:localStorage.getItem(GAKEYS.id)||'',token:localStorage.getItem(GAKEYS.token)||''}}
function saveGA(id,token){localStorage.setItem(GAKEYS.id,id);localStorage.setItem(GAKEYS.token,token)}
function gaConfigured(){var g=getGA();return g.id&&g.token}
var MONTHS=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
function getData(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):[]}catch(e){return[]}}
function fmt(n){return n?Math.round(n).toLocaleString("ru-RU"):"0"}
function calcCharges(apt,meter){
  var t=apt.tariffs||{};var el=meter?(meter.electricity||0)*t.electricity:0,elS=meter?(meter.electricityStorage||0)*t.electricity:0,ac=meter?(meter.autoCharge||0)*(t.autoCharge||0):0;
  var gas=apt.hasGas?apt.area*(t.gas||0):0,cl=t.cleaning||0,tr=t.trash||0,ic=apt.hasIntercom?(t.intercom||0):0;
  var sc=t.security||0,ev=apt.hasElevator?(t.elevator||0):0,odn=t.odn||0,sal=t.salary||0,inet=apt.hasInternet?(t.internet||0):0;
  return{electricity:Math.round(el*100)/100,electricityStorage:Math.round(elS*100)/100,autoCharge:Math.round(ac*100)/100,gas:Math.round(gas*100)/100,cleaning:cl,trash:tr,intercom:ic,security:sc,elevator:ev,odn:odn,salary:sal,internet:inet,total:Math.round((el+elS+ac+gas+cl+tr+ic+sc+ev+odn+sal+inet)*100)/100};
}
function genPDFBase64(apt,ch,month,year,paid,paidAmt){
  if(!window.jspdf)return null;
  var doc=new window.jspdf.jsPDF({unit:'mm',format:'a4'}),W=210,M=15,y=20,lh=6;
  function ln(l,v,b){if(b)doc.setFont('helvetica','bold');else doc.setFont('helvetica','normal');doc.setFontSize(10);doc.text(l,M,y);doc.text(fmt(v)+' tg',W-M,y,{align:'right'});y+=lh}
  doc.setFillColor(15,23,42);doc.rect(0,0,W,35,'F');doc.setTextColor(255);doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('ZHK AKSU',M,15);
  doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text('Kvitanciya',M,22);doc.text(MONTHS[month-1]+' '+year,M,29);
  y=45;doc.setTextColor(0);doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text(apt.number+' - '+apt.owner,M,y);y+=10;doc.setTextColor(0);
  [['Elektroenergia',ch.electricity],['Elektr. (klad.)',ch.electricityStorage],['Avto zaryadka',ch.autoCharge],['Gaz',ch.gas],['Uborka',ch.cleaning],['TBO',ch.trash],['Domofon',ch.intercom],['Okhrana',ch.security],['Lift',ch.elevator],['ODN',ch.odn],['Zarplata',ch.salary],['Internet',ch.internet]].forEach(function(i){if(i[1]>0)ln(i[0],i[1],false)});
  doc.setDrawColor(200);doc.line(M,y-2,W-M,y-2);y+=2;doc.setFontSize(12);ln('ITOGO:',ch.total,true);y+=4;
  if(paid){doc.setFillColor(209,250,229);doc.roundedRect(M,y,W-2*M,12,3,3,'F');doc.setTextColor(5,150,105);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('OPLACHENO: '+fmt(paidAmt)+' tg',W/2,y+8,{align:'center'})}
  else{doc.setFillColor(254,226,226);doc.roundedRect(M,y,W-2*M,12,3,3,'F');doc.setTextColor(220,38,38);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('DOLG: '+fmt(ch.total-paidAmt)+' tg',W/2,y+8,{align:'center'})}
  return doc.output('datauristring').split(',')[1];
}

// ===== SEND VIA GREEN API =====
async function gaSendMessage(phone,text){
  var g=getGA();
  var url='https://api.green-api.com/waInstance'+g.id+'/sendMessage/'+g.token;
  var chatId=phone.replace(/[^0-9]/g,'')+'@c.us';
  var resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId:chatId,message:text})});
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  return await resp.json();
}

async function gaSendFile(phone,base64,filename,caption){
  var g=getGA();
  var url='https://api.green-api.com/waInstance'+g.id+'/sendFileByUpload/'+g.token;
  // Convert base64 to blob
  var byteChars=atob(base64);var byteArr=new Uint8Array(byteChars.length);
  for(var i=0;i<byteChars.length;i++)byteArr[i]=byteChars.charCodeAt(i);
  var blob=new Blob([byteArr],{type:'application/pdf'});
  var fd=new FormData();
  fd.append('chatId',phone.replace(/[^0-9]/g,'')+'@c.us');
  fd.append('file',blob,filename);
  fd.append('fileName',filename);
  if(caption)fd.append('caption',caption);
  var resp=await fetch(url,{method:'POST',body:fd});
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  return await resp.json();
}

async function gaTestConnection(){
  var g=getGA();
  var url='https://api.green-api.com/waInstance'+g.id+'/getStateInstance/'+g.token;
  var resp=await fetch(url);
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  return await resp.json();
}

async function startBulkSend(month,year){
  window._gaSending=true;
  var btn=document.getElementById('ga-start-send');btn.disabled=true;btn.textContent='Отправка...';
  var progress=document.getElementById('ga-progress');progress.style.display='block';
  var bar=document.getElementById('ga-progress-bar');
  var log=document.getElementById('ga-log');
  var apts=getData('zhk-apartments');
  var meters=getData('zhk-meters');
  var payments=getData('zhk-payments');
  var withPhone=apts.filter(function(a){return a.phone});
  var sent=0,failed=0,skipped=0;

  for(var i=0;i<withPhone.length;i++){
    var apt=withPhone[i];
    var pct=Math.round((i/withPhone.length)*100);
    bar.style.width=pct+'%';

    var meter=meters.find(function(m){return m.apartmentId===apt.id&&m.month===month&&m.year===year});
    var charges=calcCharges(apt,meter);
    var paidAmt=payments.filter(function(p){return p.apartmentId===apt.id&&p.month===month&&p.year===year}).reduce(function(s,p){return s+p.amount},0);
    var paid=paidAmt>=charges.total;
    var debt=charges.total-paidAmt;

    log.innerHTML+='<div class="ga-log-item wait">⏳ '+apt.number+' ('+apt.owner+')...</div>';
    log.scrollTop=log.scrollHeight;

    try{
      // Generate PDF
      var pdfB64=genPDFBase64(apt,charges,month,year,paid,paidAmt);
      if(!pdfB64)throw new Error('PDF generation failed');

      var caption='Kvitanciya ZHK AKSU\n🏠 '+apt.number+' — '+apt.owner+'\n📅 '+MONTHS[month-1]+' '+year+'\n💰 Nachisleno: '+fmt(charges.total)+' tg';
      if(debt>0)caption+='\n⚠️ Dolg: '+fmt(debt)+' tg';
      else caption+='\n✅ Oplacheno';

      var filename=apt.number+'_'+MONTHS[month-1]+'_'+year+'.pdf';

      await gaSendFile(apt.phone,pdfB64,filename,caption);
      sent++;
      // Replace last log entry
      log.lastChild.className='ga-log-item ok';
      log.lastChild.textContent='✓ '+apt.number+' — отправлено ('+apt.phone+')';
    }catch(e){
      failed++;
      log.lastChild.className='ga-log-item err';
      log.lastChild.textContent='✗ '+apt.number+' — ошибка: '+e.message;
    }

    log.scrollTop=log.scrollHeight;
    // Delay between messages to avoid spam detection
    if(i<withPhone.length-1)await new Promise(function(r){setTimeout(r,2000)});
  }

  bar.style.width='100%';
  window._gaSending=false;
  btn.textContent='✓ Готово!';

  // Summary
  var noPhone=apts.length-withPhone.length;
  var summary=document.getElementById('ga-summary');
  summary.style.display='grid';
  summary.innerHTML='<div class="ga-summary-item" style="background:#ecfdf5"><div class="num" style="color:#059669">'+sent+'</div><div class="lbl">Отправлено</div></div><div class="ga-summary-item" style="background:#fef2f2"><div class="num" style="color:#dc2626">'+failed+'</div><div class="lbl">Ошибок</div></div><div class="ga-summary-item" style="background:#fefce8"><div class="num" style="color:#a16207">'+noPhone+'</div><div class="lbl">Без номера</div></div>';
}

function doWhatsApp(apt,ch,month,year,paid,paidAmt){

function injectWhatsApp(){

      var waBtn=document.createElement('button');waBtn.className='wa-share-btn';waBtn.innerHTML=waIcon(14)+' WhatsApp';waBtn.style.marginTop='6px';
      waBtn.addEventListener('click',function(ev){
        ev.stopPropagation();
        // Fresh read from localStorage every click
        var freshApt=getApt(apt.id);
        var phone=(freshApt&&freshApt.phone)||"";
        if(!phone){alert('Добавьте номер телефона для '+apt.number+' в разделе «Квартиры» → Редактировать');return}

        var p=getCurrentPeriod(),meters=getData(KEYS.meters),payments=getData(KEYS.payments);
        var meter=meters.find(function(m){return m.apartmentId===apt.id&&m.month===p.month&&m.year===p.year});
        var charges=calcCharges(freshApt,meter);
        var pa=payments.filter(function(x){return x.apartmentId===apt.id&&x.month===p.month&&x.year===p.year}).reduce(function(s,x){return s+x.amount},0);

      });

function showHistory(aptId){

function generateActSverki(aptId){
  if(!window.jspdf)return;
  var apts=getData('zhk-apartments'),meters=getData('zhk-meters'),payments=getData('zhk-payments');
  var apt=apts.find(function(a){return a.id===aptId});if(!apt)return;
  var doc=new window.jspdf.jsPDF({unit:'mm',format:'a4'}),W=210,M=15,y=15;
  // Header
  doc.setFillColor(15,23,42);doc.rect(0,0,W,30,'F');
  doc.setTextColor(255);doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('AKT SVERKI — '+apt.number,M,13);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(apt.owner+' | '+new Date().toLocaleDateString('ru-RU'),M,22);
  y=40;doc.setTextColor(0);
  // Collect all months
  var mm={};
  meters.filter(function(m){return m.apartmentId===aptId}).forEach(function(m){var k=m.year*100+m.month;if(!mm[k])mm[k]={year:m.year,month:m.month,meter:m,paid:0};else mm[k].meter=m});
  payments.filter(function(p){return p.apartmentId===aptId}).forEach(function(p){var k=p.year*100+p.month;if(!mm[k])mm[k]={year:p.year,month:p.month,meter:null,paid:0};mm[k].paid+=p.amount});
  var keys=Object.keys(mm).sort();
  // Table header
  doc.setFontSize(9);doc.setFont('helvetica','bold');
  doc.text('Период',M,y);doc.text('Начислено',80,y);doc.text('Оплачено',120,y);doc.text('Долг/Перепл.',160,y);
  y+=2;doc.setDrawColor(200);doc.line(M,y,W-M,y);y+=5;
  doc.setFont('helvetica','normal');
  var totalC=0,totalP=0;
  keys.forEach(function(k){
    var d=mm[k];var ch=calcCharges(apt,d.meter).total;totalC+=ch;totalP+=d.paid;
    var diff=ch-d.paid;
    doc.text(MONTHS[d.month-1]+' '+d.year,M,y);
    doc.text(fmt(ch),80,y);
    doc.text(fmt(d.paid),120,y);
    doc.setTextColor(diff>0?220:5,diff>0?38:150,diff>0?38:105);
    doc.text((diff>0?'':'')+fmt(Math.abs(diff)),160,y);
    doc.setTextColor(0);y+=6;
    if(y>270){doc.addPage();y=20}
  });
  // Total
  y+=3;doc.setDrawColor(0);doc.line(M,y,W-M,y);y+=6;
  doc.setFont('helvetica','bold');doc.setFontSize(11);
  var totalDiff=totalC-totalP;
  doc.text('ITOGO:',M,y);
  doc.text('Nachisleno: '+fmt(totalC),60,y);
  doc.text('Oplacheno: '+fmt(totalP),110,y);
  doc.setTextColor(totalDiff>0?220:5,totalDiff>0?38:150,totalDiff>0?38:105);
  doc.text((totalDiff>0?'Dolg: ':'Pereplata: ')+fmt(Math.abs(totalDiff)),155,y);
  // Footer
  y+=15;doc.setTextColor(150);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('Dokument sformirovam: '+new Date().toLocaleString('ru-RU')+' | ZHK AKSU',M,y);
  // Save
  var fn='Akt_sverki_'+apt.number+'_'+new Date().toISOString().slice(0,10)+'.pdf';
  doc.save(fn);
}

function injectQR(){
  var root=document.getElementById('root');if(!root)return;
  new MutationObserver(function(){
    document.querySelectorAll('button').forEach(function(btn){
      if(!btn.textContent.includes('квитанцию'))return;
      var card=btn.closest('.bg-white');if(!card||card.querySelector('.qr-wrap'))return;
      var ne=card.querySelector('.font-black.text-slate-800');if(!ne)return;
      var aptNum=ne.textContent.trim();
      var totalEl=card.querySelector('.text-2xl');
      if(!totalEl)return;
      var amount=totalEl.textContent.replace(/[^\d.,]/g,'').replace(',','.').trim();
      // Get Kaspi phone from settings
      var kaspiPhone=localStorage.getItem('zhk-kaspi-phone')||'';
      if(!kaspiPhone||!window.QRCode)return;
      var debtEl=card.querySelector('.text-red-600.font-semibold');
      var debtAmt=debtEl?debtEl.textContent.replace(/[^\d.,]/g,'').replace(',','.').trim():amount;
      // Kaspi deep link format
      var qrText='https://kaspi.kz/pay/'+kaspiPhone.replace(/[^0-9]/g,'')+'?amount='+debtAmt+'&purpose=KV_'+aptNum.replace(/[^a-zA-Z0-9-]/g,'');
      var wrap=document.createElement('div');wrap.className='qr-wrap';
      var qrDiv=document.createElement('div');qrDiv.style.cssText='display:inline-block';
      wrap.appendChild(qrDiv);
      wrap.innerHTML+='<div class="qr-label">Сканируйте для оплаты через Kaspi</div>';
      card.appendChild(wrap);
      new QRCode(qrDiv,{text:qrText,width:100,height:100,colorDark:'#0f172a',colorLight:'#ffffff'});
    });
  }).observe(root,{childList:true,subtree:true});
}

function calculateDistribution(){
  var type=document.getElementById('dist-type').value;
  var month=parseInt(document.getElementById('dist-month').value);
  var year=parseInt(document.getElementById('dist-year').value);
  var amount=parseFloat(document.getElementById('dist-amount').value);
  if(!amount||amount<=0){alert('Введите сумму счёта');return}

  var apts=getData('zhk-apartments');
  var meters=getData('zhk-meters');
  var distribution=[];
  var totalConsumption=0;

  if(type==='electricity'){
    // Distribute by electricity consumption
    apts.forEach(function(apt){
      var meter=meters.find(function(m){return m.apartmentId===apt.id&&m.month===month&&m.year===year});
      var consumption=(meter?(meter.electricity||0)+(meter.electricityStorage||0)+(meter.autoCharge||0):0);
      distribution.push({apartmentId:apt.id,number:apt.number,owner:apt.owner,consumption:consumption,unit:'кВт'});
      totalConsumption+=consumption;
    });
  } else {
    // Distribute by area (gas)
    apts.forEach(function(apt){
      var area=apt.area||0;
      distribution.push({apartmentId:apt.id,number:apt.number,owner:apt.owner,consumption:area,unit:'м²'});
      totalConsumption+=area;
    });
  }

  // Calculate shares
  distribution.forEach(function(d){
    d.share=totalConsumption>0?d.consumption/totalConsumption:0;
    d.amount=Math.round(amount*d.share);
  });

  // Sort by amount descending
  distribution.sort(function(a,b){return b.amount-a.amount});

  // Render result
  var resultDiv=document.getElementById('dist-result');
  var typeLabel=type==='electricity'?'электричество':'газ';
  var h='<div class="bal-section" style="margin-top:16px">📊 Распределение: '+fmt(amount)+' тг за '+typeLabel+' ('+MONTHS[month-1]+' '+year+')</div>';
  if(totalConsumption===0){
    h+='<div class="dist-info" style="background:#fef2f2;border-color:#fecaca;color:#dc2626">Нет данных по потреблению за этот месяц. Убедитесь, что показания счётчиков внесены.</div>';
    resultDiv.innerHTML=h;return;
  }
  h+='<table class="dist-table"><thead><tr><th>Квартира</th><th>Владелец</th><th style="text-align:right">Потребление</th><th style="text-align:right">Доля</th><th style="text-align:right">Сумма (тг)</th></tr></thead><tbody>';
  var checkSum=0;
  distribution.forEach(function(d){
    checkSum+=d.amount;
    h+='<tr><td><b>'+d.number+'</b></td><td>'+d.owner+'</td><td style="text-align:right">'+fmt(d.consumption)+' '+d.unit+'</td><td style="text-align:right">'+(d.share*100).toFixed(1)+'%</td><td style="text-align:right;font-weight:700">'+fmt(d.amount)+'</td></tr>';
  });
  // Rounding adjustment to last item
  var diff=amount-checkSum;
  if(diff!==0&&distribution.length>0)distribution[0].amount+=diff;
  h+='<tr class="total-row"><td colspan="4"><b>ИТОГО</b></td><td style="text-align:right;font-weight:800">'+fmt(amount)+'</td></tr>';
  h+='</tbody></table>';
  h+='<div style="margin-top:12px;display:flex;gap:8px">';
  h+='<button class="dist-btn dist-btn-save" id="dist-save">💾 Сохранить распределение</button>';
  h+='</div>';
  resultDiv.innerHTML=h;

  document.getElementById('dist-save').addEventListener('click',function(){
    var bills=getData('zhk-utility-bills');
    // Remove existing for same type/month/year
    bills=bills.filter(function(b){return!(b.type===type&&b.month===month&&b.year===year)});
    bills.push({
      id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      type:type,month:month,year:year,totalAmount:amount,
      distribution:distribution.map(function(d){return{apartmentId:d.apartmentId,share:d.share,amount:d.amount}})
    });
    localStorage.setItem('zhk-utility-bills',JSON.stringify(bills));
    alert('✓ Распределение сохранено!');
    showDistribution();
  });
}

// ==============================
// NAV BUTTONS
// ==============================
function injectNavButtons(){
  var sb=document.querySelector('.fixed.left-0.top-0.h-full.w-56');
  if(!sb){setTimeout(injectNavButtons,300);return}
  if(document.getElementById('balance-nav'))return;
  var gaNav=document.getElementById('ga-nav');

  // Balance button
  var balBtn=document.createElement('button');balBtn.id='balance-nav';balBtn.className='mega-nav-btn';
  balBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Баланс ЖК';
  balBtn.addEventListener('click',function(){showBalance();closeMobileSidebar()});

  // Distribution button
  var distBtn=document.createElement('button');distBtn.id='dist-nav';distBtn.className='mega-nav-btn';
  distBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 00-1.172-2.828L3 3"/><path d="m15 9 6-6"/></svg> Распределение';
  distBtn.addEventListener('click',function(){showDistribution();closeMobileSidebar()});

  // Kaspi QR button
  var kaspiBtn=document.createElement('button');kaspiBtn.id='kaspi-nav';kaspiBtn.className='mega-nav-btn';
  kaspiBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3z"/><path d="M20 14v3h-3"/><path d="M14 20h3"/><path d="M20 20h0"/></svg> Kaspi QR';
  var kaspiConfigured=!!localStorage.getItem('zhk-kaspi-phone');
  if(kaspiConfigured){var dot=document.createElement('span');dot.style.cssText='width:8px;height:8px;border-radius:50%;background:#22c55e;margin-left:auto';kaspiBtn.appendChild(dot)}
  kaspiBtn.addEventListener('click',function(){openKaspiSettings();closeMobileSidebar()});

  if(gaNav){gaNav.parentElement.insertBefore(balBtn,gaNav);gaNav.parentElement.insertBefore(distBtn,gaNav);gaNav.parentElement.insertBefore(kaspiBtn,gaNav.nextSibling)}
  else{var exp=document.getElementById('data-transfer-btns');if(exp){sb.insertBefore(balBtn,exp);sb.insertBefore(distBtn,exp);sb.insertBefore(kaspiBtn,exp)}}
}

function closeMobileSidebar(){
  var s=document.querySelector('.sidebar-open');
  if(s&&window.innerWidth<=768){s.classList.remove('sidebar-open');
    var ov=document.getElementById('mobile-overlay');if(ov)ov.style.display='none';
    var hb=document.getElementById('mobile-hamburger');if(hb)hb.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
  }
}

// ==============================
// INIT
// ==============================
function initMega(){
  createBalanceModal();
  createDistributionModal();
  createKaspiSettings();
  injectQR();
  patchHistory();
  addChartsToHistory();
  injectNavButtons();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){setTimeout(initMega,800)});
else setTimeout(initMega,800);
})();
</script>
